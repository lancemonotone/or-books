<section class="productCarousel newprd"
>
    {{#each products}}
    <div data-product-slide class="productCarousel-slide">
        {{> components/orbooks/card settings=../settings theme_settings=../theme_settings customer=../customer event="list" position=(add @index 1)}}
    </div>
    {{/each}}
    {{#if products.length '>' 1}}
        {{> components/carousel-content-announcement}}
    {{/if}}
</section>
