<h2 class="page-heading">{{lang 'products.featured' }} <span class="cate_link"><a href="reading-lists/the-palestine-list/" target="_blank">See all</a></span></h2>
<h5 class="feature-heading"></h5>

<ul class="productGrid productGrid--maxCol{{ columns }} productCarousel newprd-sale" data-product-type="featured" {{#if settings.data_tag_enabled}} data-list-name="Featured Products" {{/if}}
data-slick='{
    "dots": false,
    "arrows": true,
    "infinite": true,
    "slidesToShow": 3,
    "responsive": [
        {
          "breakpoint": 1000,
        "settings": {
          "slidesToShow": 3
        }
        },
        {
          "breakpoint": 600,
          "settings": {
            "slidesToShow": 2
          }
        },
        {
          "breakpoint": 500,
          "settings": {
            "slidesToShow": 1
          }
        }
    ]
}'
>
    {{#each products}}
        <li class="product">
                {{>components/orbooks/card settings=../settings theme_settings=../theme_settings customer=../customer event="list" position=(add @index 1)}}
        </li>
    {{/each}}
</ul>
