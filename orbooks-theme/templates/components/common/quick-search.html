<div class="container">
    {{{ snippet "forms_search"}}}
    <a href="javascript:void(0);" id="" class="form-close close_search_popup" onclick="close_popup()">
        <span>x</span>
    </a>
    <!-- <span class="form-close">X</span> -->
    <form class="form" onsubmit="return false" data-url="{{urls.search}}" data-quick-search-form>
        <fieldset class="form-fieldset">
            <div class="form-field">
                <input class="form-input search-input"
                       data-search-quick
                       name="{{name}}"
                       id="{{name}}"
                       data-error-message="{{lang 'search.error.empty_field'}}"
                       placeholder="{{lang 'search.quick_search.input_placeholder'}}"
                       autocomplete="off"
                >
            </div>
        </fieldset>
    </form>
    <section class="quickSearchResults quick-results" data-bind="html: results"></section>
    <p role="status"
       aria-live="polite"
       class="aria-description--hidden"
       data-search-aria-message-predefined-text="{{{lang 'search.results.quick_count_live'}}}"
    ></p>
</div>
