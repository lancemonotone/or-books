<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("or-audit-theme") || "system";
        var dark =
          stored === "dark" ||
          (stored === "system" &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        document.documentElement.dataset.themePref = stored;
      } catch (e) {
        document.documentElement.dataset.theme = "light";
        document.documentElement.dataset.themePref = "system";
      }
    })();
  </script>
  <link rel="icon" href="assets/briefboard-mark.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="is-locked is-booting">
  <a class="skip-link" href="#main">Skip to content</a>

  <div
    class="boot-splash"
    id="boot-splash"
    role="status"
    aria-live="polite"
    aria-busy="true"
    aria-label="Loading BriefBoard"
  >
    <div class="boot-splash__inner">
      <img
        class="boot-splash__mark"
        src="assets/briefboard-mark.svg"
        width="400"
        height="400"
        alt=""
        aria-hidden="true"
      >
      <p class="boot-splash__label">BriefBoard</p>
    </div>
  </div>

  <section class="auth-panel" id="auth-panel" hidden>
    <div class="auth-panel__card">
      <h1>Sign in</h1>
      <p class="auth-panel__lede">Enter the review password to continue.</p>
      <form class="auth-form" id="login-form">
        <label class="field">
          <span class="field__label">Password</span>
          <input type="password" name="password" id="login-password" required autocomplete="current-password">
        </label>
        <label class="auth-honeypot" aria-hidden="true">
          <span>Website</span>
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </label>
        <button type="submit" class="button">Sign in</button>
        <p class="save-status" id="login-status" role="status"></p>
      </form>
    </div>
  </section>

  <section class="auth-panel" id="auth-blocked" hidden>
    <div class="auth-panel__card">
      <h1>Review not configured</h1>
      <p class="auth-panel__lede">
        Copy <code>api/config.example.php</code> to <code>api/config.php</code> and set
        <code>editor_password</code>.
      </p>
    </div>
  </section>

  <header class="site-header" data-view-transition="header" id="site-header" hidden>
    <div class="site-header__inner">
      <a class="site-header__brand" href="#/" data-nav data-brand></a>
      <nav class="site-nav" aria-label="Primary">
        <a href="#/" data-nav>Overview</a>
        <a href="#/evidence" data-nav>Screenshots</a>
        <a href="#/decisions" data-nav>Questions</a>
        <a href="#/responses" data-nav data-presenter>Summary</a>
        <a href="edit/">Editor</a>
        <a
          class="site-nav__icon-link"
          href="#/settings"
          data-nav
          aria-label="Settings"
          title="Settings"
        >
          <svg class="site-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
        </a>
        <button
          type="button"
          class="site-nav__button site-nav__icon-button"
          id="logout-button"
          aria-label="Sign out"
          title="Sign out"
        >
          <svg class="site-nav__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="site-main" data-view-transition="main" tabindex="-1" hidden></main>

  <dialog class="lightbox" id="lightbox" aria-label="Screenshot viewer">
    <div class="lightbox__toolbar">
      <span class="lightbox__title" id="lightbox-title"></span>
      <button type="button" class="lightbox__close" data-lightbox-close aria-label="Close">×</button>
    </div>
    <div class="lightbox__stage">
      <button type="button" class="lightbox__nav lightbox__nav--prev" data-lightbox-prev aria-label="Previous screenshot" hidden>‹</button>
      <div class="lightbox__body" id="lightbox-body"></div>
      <button type="button" class="lightbox__nav lightbox__nav--next" data-lightbox-next aria-label="Next screenshot" hidden>›</button>
    </div>
    <div class="lightbox__footer" id="lightbox-footer"></div>
  </dialog>

  <template id="tpl-save-status">
    <p class="save-status" role="status"></p>
  </template>

  <script src="assets/vendor/js-yaml.min.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
