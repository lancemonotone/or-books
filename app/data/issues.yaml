      caption: FAQ page
- id: '2.1'
  sprint: 2
  title: Make headings and titles easier to tell apart
  impact: high
  effort: medium
  status: planned
  tags:
    - typography
  problem: |
    Section headings, book titles, and pull quotes are too similar in size and weight. Everything competes for attention.
  recommendation: |
    Set clear rules for heading sizes so section titles, book titles, and quotes each have their own level.
  acceptance:
    - Section heading vs book title distinguishable at a glance
  evidence:
    - file: 120911.png
      caption: Homepage headings
    - file: 123249.png
      caption: Large review quote
- id: '2.2'
  sprint: 2
  title: Make buttons look consistent
  impact: high
  effort: medium
  status: planned
  tags:
    - buttons
    - forms
  problem: |
    Add to Cart, Submit, View All, Subscribe, and the quantity control all look different from page to page.
