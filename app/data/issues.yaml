    - file: 160840.png
      caption: Reading Lists module
- id: '1.7'
  sprint: 1
  title: Add a way back from news articles
  impact: high
  effort: low
  status: planned
  tags:
    - navigation
    - news
  problem: |
    After opening a news or media article there is no obvious way back to the list. You have to scroll to the footer.
  recommendation: |
    Put a Back to News link or similar at the top of each article.
  acceptance:
    - User returns to news listing in one tap from any article
  evidence:
    - file: 123327.png
      caption: News article
    - file: 161534.png
      caption: Media article
- id: '1.8'
  sprint: 1
  title: Open media articles on the first tap
  impact: high
  effort: low
  status: planned
  tags:
    - interaction
    - media
  problem: |
    In the In the Media list, tapping an item shows a Read Now button instead of opening the article. It takes a second tap to get there.
  recommendation: |
    Let the whole row open the article on the first tap. Drop the overlay button in the middle.
  acceptance:
    - First tap on a media row navigates immediately
    - No intermediate overlay CTA blocking the card
  evidence:
    - file: 123119.mp4
      caption: Screen recording
    - file: 161238.png
      caption: Read Now overlay
- id: '1.9'
  sprint: 1
  title: Link to other pages mentioned in the FAQ
  impact: high
  effort: low
  status: planned
