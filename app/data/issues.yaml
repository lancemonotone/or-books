- id: '1.1'
  sprint: 1
  title: Add side margins on mobile pages
  impact: critical
  effort: low
  status: planned
  tags:
    - layout
    - spacing
  problem: |
    On several pages the text runs right to the edge of the screen. On the book page in particular there is almost no space on the left and right.
  recommendation: |
    Give all main page content the same left and right padding on a phone so reading is comfortable everywhere.
  acceptance:
    - No body copy or primary controls touch the viewport edge on mobile
    - Book detail and catalog pages use the same horizontal inset
  evidence:
    - file: 123249.png
      caption: Book page, text at the edge
- id: '1.2'
  sprint: 1
  title: Label or Replace the Subjects icons
  impact: critical
  effort: low
  status: planned
  tags:
    - navigation
    - subjects
  problem: |
    The Subjects page shows icons only. Without words under them, it is hard to tell what each category is.
  recommendation: |
    Add a short label under each icon or replace the icon with text.
  acceptance:
    - Every subject icon has a visible text label on mobile
  evidence:
    - file: 121022.png
- id: '1.3'
  sprint: 1
  title: Keep the header visible when searching
  impact: critical
  effort: medium
  status: planned
  tags:
    - search
    - navigation
  problem: |
    Tapping search opens a different screen with different wording, and the top header disappears. It is easy to lose your place.
  recommendation: |
    Use one search box from start to finish and keep the header and logo on screen the whole time.
  acceptance:
    - One search field and placeholder from entry through results
    - Header and logo remain visible during search
    - Same close affordance throughout the flow
  evidence:
    - file: 121855.png
      caption: Search, first screen
    - file: 121904.png
      caption: Search, second screen, header gone
- id: '1.4'
  sprint: 1
  title: Show email addresses the same way everywhere
  impact: high
  effort: low
  status: planned
  tags:
    - content
    - contact
  problem: |
    Some pages spell out orders [at] orbooks.com and others use rights@orbooks.com. The [at] version cannot be tapped to open mail on a phone.
  recommendation: |
    Pick one format for the whole site. We suggest normal addresses as links people can tap, unless you prefer the [at] style everywhere.
  acceptance:
    - No page mixes [at] and @ formats
    - All displayed emails are tappable mailto links (if mailto policy chosen)
  evidence:
    - file: 125307.png
      caption: Booksellers, mixed formats
    - file: 125811.png
      caption: Terms page
    - file: 130006.png
      caption: Shipping info
    - file: 125454.png
      caption: Rights Enquiries
    - file: 123949.png
      caption: Contact page
- id: '1.5'
  sprint: 1
  title: Fix text that looks like a link but is not
  impact: high
  effort: low
  status: planned
  tags:
    - navigation
    - homepage
  problem: |
    See all and some section titles look like links but nothing happens when you tap them. Real links nearby make the problem worse.
  recommendation: |
    Either make those words real links or style them so they clearly are not clickable.
  acceptance:
    - Every See all / View all is either a working link or clearly plain text
    - Homepage modules audited and consistent
  evidence:
    - file: 120911.png
      caption: Homepage, See all
    - file: 161534.png
      caption: Article page, section title
- id: '1.6'
  sprint: 1
  title: Fix Reading Lists View All page
  impact: high
  effort: medium
  status: planned
  tags:
    - navigation
    - homepage
  problem: |
    View All under Reading Lists goes to a page that shows the same icons already on the homepage. There is nothing new there.
  recommendation: |
    Add real content on that page (descriptions, filters, etc.) or remove the link and keep the module on the homepage only.
  acceptance:
    - View All page adds value beyond the homepage module, or route is removed
