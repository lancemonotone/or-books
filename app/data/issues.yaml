- id: '2.15'
  sprint: 2
  title: Keep bookseller signup on orbooks.com
  impact: medium
  effort: medium
  status: blocked
  tags:
    - forms
    - mailchimp
  problem: |
    The bookseller signup sends people to an external Mailchimp page. They leave the OR Books site. The Booksellers page also has uneven text sizing around the orders email.
